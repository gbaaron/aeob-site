[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect SPA-style routes to clean URLs
[[redirects]]
  from = "/episodes"
  to = "/episodes.html"
  status = 200

[[redirects]]
  from = "/predictions"
  to = "/predictions.html"
  status = 200

[[redirects]]
  from = "/submissions"
  to = "/submissions.html"
  status = 200

[[redirects]]
  from = "/rewards"
  to = "/rewards.html"
  status = 200

[[redirects]]
  from = "/schedule"
  to = "/schedule.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets — short cache during active development
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
